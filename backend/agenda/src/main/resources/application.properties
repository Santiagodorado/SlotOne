spring.application.name=agenda
server.port=5005

spring.datasource.url=jdbc:h2:mem:agendadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# URL del micro negocios (para leer correo del negocio al notificar nuevas reservas).
slotone.negocios.base-url=${SLOTONE_NEGOCIOS_BASE_URL:http://localhost:5004}

# Email real para HU-S2-09. No guardes claves aquí: usa variables de entorno.
slotone.mail.enabled=${SLOTONE_MAIL_ENABLED:false}
slotone.mail.from=${SLOTONE_MAIL_FROM:no-reply@slotone.local}
slotone.mail.business-to=${SLOTONE_MAIL_BUSINESS_TO:}
# Opcional: si el negocio no tiene correo en BD, usa este valor (ej. desarrollo).

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.connectiontimeout=${SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${SMTP_WRITE_TIMEOUT:5000}
