spring.application.name=usuarios
server.port=${PORT:5000}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/slotone_usuarios}
spring.datasource.username=${DB_USERNAME:slotone}
spring.datasource.password=${DB_PASSWORD:slotone_dev}
spring.sql.init.mode=never

spring.flyway.enabled=true

# Configuración JWT - debe coincidir con el gateway
bezkoder.app.jwtSecret=${JWT_SECRET:U2kgdmlzIHBhY2VtLCBwYXJhIGJlbGx1bSBNZW1lbnRvIG1vcmk=}
bezkoder.app.jwtExpirationMs=${JWT_EXPIRATION_MS:3600000}

# Avisos en arranque: Flyway aún no declara soporte oficial para PostgreSQL 18; Security avisa por DaoAuthenticationProvider + JWT (config intencional).
