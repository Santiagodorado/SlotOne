spring.application.name=gateway
server.port=${PORT:8080}

# Targets de microservicios (Render/Vercel: URLs https sin barra final)
slotone.gateway.usuarios-uri=${SLOTONE_USUARIOS_URL:http://localhost:5000}
slotone.gateway.negocios-uri=${SLOTONE_NEGOCIOS_URL:http://localhost:5004}
slotone.gateway.agenda-uri=${SLOTONE_AGENDA_URL:http://localhost:5005}

# Frontend (Vercel): lista separada por comas — ej. https://slotone.vercel.app,http://localhost:5173
slotone.cors.allowed-origins=${SLOTONE_ALLOWED_ORIGINS:http://localhost:5173}

# Configuración JWT (debe ser idéntica al microservicio usuarios). En prod usa JWT_SECRET/JWT_EXPIRATION_MS
bezkoder.app.jwtSecret=${JWT_SECRET:U2kgdmlzIHBhY2VtLCBwYXJhIGJlbGx1bSBNZW1lbnRvIG1vcmk=}
bezkoder.app.jwtExpirationMs=${JWT_EXPIRATION_MS:3600000}

## Configuración de CORS
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
#spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.co.edu.unicauca.gateway=DEBUG
logging.level.reactor.netty=DEBUG

# Timeouts: en Render (plan free) el cold start de cada micro puede tardar >30s; si es corto, el home (/api/negocios) devuelve 504.
# connect-timeout en milisegundos; response-timeout como Duration.
spring.cloud.gateway.httpclient.connect-timeout=120000
spring.cloud.gateway.httpclient.response-timeout=120s

