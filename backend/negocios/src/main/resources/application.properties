spring.application.name=negocios
server.port=${PORT:5004}

# Logos en base64 (data URL) en JSON
server.tomcat.max-http-form-post-size=15MB
server.tomcat.max-swallow-size=15MB
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5433/slotone_negocios}
spring.datasource.username=${DB_USERNAME:slotone}
spring.datasource.password=${DB_PASSWORD:slotone_dev}

# Mismo secreto/expiración que usuarios y gateway (validación del Bearer JWT)
bezkoder.app.jwtSecret=${JWT_SECRET:U2kgdmlzIHBhY2VtLCBwYXJhIGJlbGx1bSBNZW1lbnRvIG1vcmk=}
bezkoder.app.jwtExpirationMs=${JWT_EXPIRATION_MS:3600000}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
